<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Homework 10. Timer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <script type="module" crossorigin src="/goit-js-hw-10/1-timer.js"></script>
    <link rel="modulepreload" crossorigin href="/goit-js-hw-10/assets/modulepreload-polyfill-B5Qt9EMX.js">
    <link rel="modulepreload" crossorigin href="/goit-js-hw-10/assets/vendor-Dov3POoy.js">
    <link rel="stylesheet" crossorigin href="/goit-js-hw-10/assets/1-timer-DP8Fzg7l.css">
  </head>
  <body>
    <div class="container">
      <a href="index.html" class="btn-back">Back to main menu</a>
      <div class="container-timer">
        <input class="input-date" type="text" id="datetime-picker" />
        <button type="button" data-start>Start</button>

        <div class="timer">
          <div class="field">
            <span class="value" data-days>00</span>
            <span class="label">DAYS</span>
          </div>
          <div class="field">
            <span class="value" data-hours>00</span>
            <span class="label">HOURS</span>
          </div>
          <div class="field">
            <span class="value" data-minutes>00</span>
            <span class="label">MINUTES</span>
          </div>
          <div class="field">
            <span class="value" data-seconds>00</span>
            <span class="label">SECONDS</span>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
